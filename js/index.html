<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Quién Tiene? - Inicio</title>
  <!-- Cargamos la librería de Supabase para que funcione la conexión -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Cargamos tu archivo de configuración que acabamos de crear -->
  <script src="js/supabase.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 5px;
    }
    p {
      color: #7f8c8d;
      font-size: 14px;
      margin-bottom: 25px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #2ecc71;
      border: none;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.3s;
    }
    button:hover {
      background: #27ae60;
    }
    .toggle-link {
      margin-top: 15px;
      display: inline-block;
      color: #3498db;
      text-decoration: none;
      font-size: 13px;
    }
    /* Modal de selección de rol */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      max-width: 300px;
      width: 100%;
    }
    .modal-btn {
      background: #3498db;
      margin: 10px 0;
    }
    .modal-btn.seller {
      background: #e67e22;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>¿Quién Tiene?</h1>
    <p>Encuentra productos locales al instante</p>
    
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required>
    
    <button id="btn-primary" onclick="handleAuth()">Iniciar Sesión</button>
    <a href="#" id="toggle-auth" class="toggle-link" onclick="toggleMode(event)">¿No tienes cuenta? Regístrate aquí</a>
  </div>

  <!-- Modal para elegir Rol cuando te registras -->
  <div id="role-modal" class="modal">
    <div class="modal-content">
      <h3>¿Cómo usarás la app?</h3>
      <p>Elige tu perfil para continuar:</p>
      <button class="modal-btn" onclick="selectRole('buyer')">Busco productos (Comprador)</button>
      <button class="modal-btn seller" onclick="selectRole('seller')">Tengo un negocio (Vendedor)</button>
    </div>
  </div>

  <script>
    let isLoginMode = true;
    let pendingUserId = null;

    function toggleMode(e) {
      e.preventDefault();
      isLoginMode = !isLoginMode;
      const btn = document.getElementById('btn-primary');
      const link = document.getElementById('toggle-auth');
      
      if (isLoginMode) {
        btn.innerText = 'Iniciar Sesión';
        link.innerText = '¿No tienes cuenta? Regístrate aquí';
      } else {
        btn.innerText = 'Crear Cuenta';
        link.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
      }
    }

    async function handleAuth() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Por favor, llena todos los campos.');
        return;
      }

      if (isLoginMode) {
        // --- INICIAR SESIÓN ---
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          alert('Error al iniciar sesión: ' + error.message);
          return;
        }
        // Redirige automáticamente usando la función de supabase.js
        checkAuth();
      } else {
        // --- REGISTRARSE ---
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          alert('Error al registrarse: ' + error.message);
          return;
        }
        if (data.user) {
          pendingUserId = data.user.id;
          // Mostramos el modal flotante para elegir el rol
          document.getElementById('role-modal').style.display = 'flex';
        }
      }
    }

    async function selectRole(role) {
      if (!pendingUserId) return;

      // Actualizamos el rol del usuario en la tabla 'users'
      const { error } = await supabase
        .from('users')
        .update({ role: role })
        .eq('id', pendingUserId);

      if (error) {
        alert('Error al guardar el rol: ' + error.message);
        return;
      }

      // Redirigimos según el rol elegido
      if (role === 'buyer') {
        window.location.href = 'buyer.html';
      } else {
        window.location.href = 'seller.html';
      }
    }
  </script>
</body>
</html>
