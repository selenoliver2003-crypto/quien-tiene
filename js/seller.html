<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Quién Tiene? - Panel del Vendedor</title>
  <!-- Librería de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Configuración de conexión -->
  <script src="js/supabase.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 0 auto;
    }
    h1, h2 {
      color: #2c3e50;
      margin-top: 0;
    }
    .welcome-text {
      font-weight: bold;
      color: #e67e22;
      margin-bottom: 20px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #e67e22;
      border: none;
      color: white;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #d35400;
    }
    .logout-btn {
      background: #7f8c8d;
      margin-top: 20px;
    }
    .logout-btn:hover {
      background: #95a5a6;
    }
    .product-item {
      background: #fcf8f2;
      border: 1px solid #f39c12;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
    }
    /* Modal de Configuración Inicial de Negocio */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      max-width: 350px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Panel del Vendedor 🏪</h1>
    <div id="shop-title" class="welcome-text">Cargando datos del negocio...</div>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <h2>Publicar Producto</h2>
    <input type="text" id="prod-name" placeholder="Nombre del producto (ej: Leche, Queso...)" required>
    <input type="number" id="prod-price" placeholder="Precio (Opcional)" step="0.01">
    <input type="number" id="prod-stock" placeholder="Cantidad / Stock (Opcional)">
    
    <button id="btn-publish" onclick="publishProduct()">📍 Usar mi ubicación y publicar</button>

    <h2 style="margin-top: 30px;">Mis Productos Activos</h2>
    <div id="products-list">
      <p style="color: #7f8c8d;">No has publicado productos todavía.</p>
    </div>

    <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
  </div>

  <!-- Modal Inicial: Si es un vendedor nuevo, le pedimos el nombre de su local -->
  <div id="setup-modal" class="modal">
    <div class="modal-content">
      <h3>¡Configura tu negocio!</h3>
      <p>Antes de publicar, escribe el nombre que verán los compradores:</p>
      <input type="text" id="modal-shop-name" placeholder="Ej: Abarrotes Doña Lupe" required>
      <button onclick="saveShopName()">Guardar nombre</button>
    </div>
  </div>

  <script>
    let currentUserId = null;
    let sellerProfile = null;

    // Ejecutar al cargar la página
    window.addEventListener('DOMContentLoaded', async () => {
      // Esperar un momento a que Supabase inicialice
      setTimeout(loadSellerData, 500);
    });

    async function loadSellerData() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      currentUserId = session.user.id;

      // Obtener el perfil de vendedor asociado al usuario
      let { data: seller, error } = await supabase
        .from('sellers')
        .select('*')
        .eq('user_id', currentUserId)
        .single();

      if (error && error.code !== 'PGRST116') { // Error que no sea "no se encontró fila"
        alert('Error al cargar datos: ' + error.message);
        return;
      }

      if (!seller) {
        // Es un vendedor nuevo, mostramos el modal para configurar su tienda
        document.getElementById('setup-modal').style.display = 'flex';
      } else {
        sellerProfile = seller;
        document.getElementById('shop-title').innerText = `Negocio: ${seller.shop_name}`;
        loadMyProducts();
      }
    }

    async function saveShopName() {
      const shopName = document.getElementById('modal-shop-name').value.trim();
      if (!shopName) {
        alert('Por favor, ingresa un nombre para tu negocio.');
        return;
      }

      // Creamos la tienda en la tabla 'sellers'
      const { data, error } = await supabase
        .from('sellers')
        .insert([{ user_id: currentUserId, shop_name: shopName }])
        .select()
        .single();

      if (error) {
        alert('Error al guardar el negocio: ' + error.message);
        return;
      }

      sellerProfile = data;
      document.getElementById('setup-modal').style.display = 'none';
      document.getElementById('shop-title').innerText = `Negocio: ${data.shop_name}`;
      loadMyProducts();
    }

    async function publishProduct() {
      const name = document.getElementById('prod-name').value.trim();
      const price = parseFloat(document.getElementById('prod-price').value) || null;
      const stock = parseInt(document.getElementById('prod-stock').value) || null;
      const btn = document.getElementById('btn-publish');

      if (!name) {
        alert('Escribe el nombre del producto para continuar.');
        return;
      }

      if (!navigator.geolocation) {
        alert('La geolocalización no está soportada en este navegador.');
        return;
      }

      btn.disabled = true;
      btn.innerText = '📍 Obteniendo ubicación GPS...';

      // Pedir ubicación GPS real
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          // Guardar el producto directamente con su latitud y longitud
          const { error } = await supabase
            .from('products')
            .insert([{
              seller_id: sellerProfile.id,
              name: name,
              price: price,
              stock: stock,
              lat: lat,
              lng: lng
            }]);

          if (error) {
            alert('Error al guardar el producto: ' + error.message);
          } else {
            alert('¡Producto publicado con éxito!');
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('prod-stock').value = '';
            loadMyProducts();
          }

          btn.disabled = false;
          btn.innerText = '📍 Usar mi ubicación y publicar';
        },
        (error) => {
          alert('Error de GPS: ' + error.message + '. Asegúrate de habilitar los permisos de ubicación.');
          btn.disabled = false;
          btn.innerText = '📍 Usar mi ubicación y publicar';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    async function loadMyProducts() {
      if (!sellerProfile) return;

      const { data: products, error } = await supabase
        .from('products')
        .select('*')
        .eq('seller_id', sellerProfile.id)
        .order('created_at', { ascending: false });

      const container = document.getElementById('products-list');
      container.innerHTML = '';

      if (error || !products || products.length === 0) {
        container.innerHTML = '<p style="color: #7f8c8d;">No tienes productos activos.</p>';
        return;
      }

      products.forEach(p => {
        const item = document.createElement('div');
        item.className = 'product-item';
        item.innerHTML = `
          <strong>${p.name}</strong><br>
          Precio: ${p.price ? p.price + ' Bs' : 'No definido'} | Stock: ${p.stock || 'No definido'}<br>
          <small style="color: #7f8c8d;">Ubicación: ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}</small>
        `;
        container.appendChild(item);
      });
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
