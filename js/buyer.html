<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Quién Tiene? - Panel del Comprador</title>
  <!-- Librería de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Configuración de conexión -->
  <script src="js/supabase.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f6;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 0 auto;
    }
    h1, h2 {
      color: #2c3e50;
      margin-top: 0;
    }
    .welcome-text {
      font-weight: bold;
      color: #3498db;
      margin-bottom: 20px;
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      padding: 12px 20px;
      background: #3498db;
      border: none;
      color: white;
      font-size: 15px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #2980b9;
    }
    .logout-btn {
      width: 100%;
      background: #7f8c8d;
      margin-top: 20px;
    }
    .logout-btn:hover {
      background: #95a5a6;
    }
    .results-container {
      margin-top: 20px;
    }
    .result-card {
      background: #f2f7fc;
      border: 1px solid #3498db;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .result-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .shop-name {
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }
    .product-info {
      margin-top: 5px;
      font-size: 15px;
      color: #555;
    }
    .distance-tag {
      display: inline-block;
      margin-top: 8px;
      background: #eaf2f8;
      color: #2980b9;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
    }
    .map-hint {
      margin-top: 5px;
      font-size: 11px;
      color: #7f8c8d;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Buscar Productos 🔍</h1>
    <div id="user-welcome" class="welcome-text">Obteniendo ubicación del comprador...</div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="¿Qué estás buscando? (ej: Leche)">
      <button onclick="searchProducts()">Buscar</button>
    </div>

    <h2>Resultados Cercanos</h2>
    <div id="results-list" class="results-container">
      <p style="color: #7f8c8d;">Escribe un producto arriba para empezar la búsqueda.</p>
    </div>

    <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
  </div>

  <script>
    let currentUserId = null;
    let userLat = null;
    let userLng = null;

    window.addEventListener('DOMContentLoaded', async () => {
      setTimeout(initializeBuyer, 500);
    });

    async function initializeBuyer() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      currentUserId = session.user.id;

      // Solicitar ubicación GPS del comprador al entrar
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;
            document.getElementById('user-welcome').innerText = "📍 Ubicación del comprador lista";
          },
          (error) => {
            document.getElementById('user-welcome').innerText = "⚠️ No pudimos obtener tu GPS. Los cálculos de distancia podrían fallar.";
            alert("Por favor, activa el GPS para poder calcular la distancia a las tiendas.");
          },
          { enableHighAccuracy: true }
        );
      } else {
        document.getElementById('user-welcome').innerText = "❌ GPS no soportado en este navegador.";
      }
    }

    // Fórmula Matemática Haversine para calcular distancia entre dos coordenadas en Km
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371; // Radio de la Tierra en Km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c; 
    }

    async function searchProducts() {
      const query = document.getElementById('search-input').value.trim();
      const container = document.getElementById('results-list');

      if (!query) {
        alert("Escribe un término de búsqueda.");
        return;
      }

      container.innerHTML = '<p style="color: #7f8c8d;">Buscando...</p>';

      // Buscamos productos que coincidan con la búsqueda, trayendo también el nombre del negocio (tabla sellers)
      const { data: products, error } = await supabase
        .from('products')
        .select(`
          *,
          sellers (
            shop_name
          )
        `)
        .ilike('name', `%${query}%`);

      if (error) {
        alert("Error al buscar productos: " + error.message);
        container.innerHTML = '<p style="color: #7f8c8d;">Ocurrió un error en la búsqueda.</p>';
        return;
      }

      container.innerHTML = '';

      if (!products || products.length === 0) {
        container.innerHTML = '<p style="color: #7f8c8d;">No se encontraron productos con ese nombre.</p>';
        return;
      }

      // Procesar y ordenar resultados por distancia si el GPS está disponible
      let processedProducts = products.map(p => {
        let distance = null;
        if (userLat !== null && userLng !== null && p.lat && p.lng) {
          distance = calculateDistance(userLat, userLng, p.lat, p.lng);
        }
        return { ...p, distance };
      });

      // Si tenemos distancias, ordenamos de menor a mayor distancia (más cercanos primero)
      if (userLat !== null && userLng !== null) {
        processedProducts.sort((a, b) => (a.distance || 9999) - (b.distance || 9999));
      }

      processedProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'result-card';
        
        // Formatear distancia para mostrar metros o kilómetros
        let distanceText = "Distancia desconocida (Activa el GPS)";
        if (p.distance !== null) {
          if (p.distance < 1) {
            distanceText = `A ${(p.distance * 1000).toFixed(0)} metros de ti`;
          } else {
            distanceText = `A ${p.distance.toFixed(2)} km de ti`;
          }
        }

        const shopName = p.sellers ? p.sellers.shop_name : "Tienda sin nombre";
        const priceText = p.price ? `${p.price} Bs.` : "Consultar precio";
        const stockText = p.stock ? ` | Stock: ${p.stock}` : "";

        card.innerHTML = `
          <div class="shop-name">🏪 ${shopName}</div>
          <div class="product-info"><strong>${p.name}</strong> - ${priceText}${stockText}</div>
          <div class="distance-tag">📍 ${distanceText}</div>
          <div class="map-hint">Toca aquí para abrir la ruta exacta en Google Maps 🚗</div>
        `;

        // Evento que abre Google Maps directamente con las coordenadas del producto al hacer clic
        card.onclick = () => {
          const mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
          window.open(mapUrl, '_blank');
        };

        container.appendChild(card);
      });
    }

    async function logout() {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
